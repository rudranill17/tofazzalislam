    <div class="about-body">
      <p>A distinguished Fulbright Scholar, Professor Tofazzal Islam, born on December 20, 1966, is a distinguished academic figure serving as a Professor and Founding Director of the Institute of Biotechnology and Genetic Engineering (IBGE) at Bangabandhu Sheikh Mujibur Rahman Agricultural University in Bangladesh. He earned his BScAg (Hons) and MSc(Ag) degrees, both with first-class honors, from Bangladesh Agricultural University in 1988 and 1989, respectively. Tofazzal furthered his education by completing his MS and PhD degrees in Applied Biosciences at Hokkaido University in 1999 and 2002. He has held prestigious postdoctoral positions at esteemed institutions such as Hokkaido University, University of Goettingen, University of Nottingham, and West Virginia University, under various fellowship programs including JSPS, Alexander von Humboldt, Commonwealth, and Fulbright.</p>
      <p>Throughout his career, Dr. Tofazzal has garnered international recognition for his groundbreaking research and expertise in the application of frontier sciences — tissue culture, molecular biology, genomics, and genome editing — to address the impacts of climate change on agriculture through the development of climate-smart agrobiotechnology. He is a pioneer in establishing the IBGE with state-of-the-art laboratories for cutting-edge research, securing over 10 million dollars in internationally competitive grants.</p>
      <p>Collaborating with researchers at the Global Institute for Food Security of Canada, Professor Tofazzal's team recently achieved a milestone by decoding the entire genome of a year-round fruiting jackfruit. Throughout his career, Prof. Islam has discovered over 50 novel bioactive secondary metabolites from marine and terrestrial organisms.</p>
      <p>In addition to his research, Prof. Tofazzal holds esteemed editorial roles in leading scientific journals and has authored more than 350 research articles in top-tier journals. Dr. Islam is an elected Fellow of the Bangladesh Academy of Sciences, American Phytopathological Society (USA), Bangladesh Academy of Agriculture, and The World Academy of Sciences (TWAS, Italy).</p>
      <p>Prof. Tofazzal's research endeavors have been generously funded by various international organizations, including the World Bank, Bill &amp; Melinda Gates Foundation, and USDA-FAS, among others.</p>

const editor = grapesjs.init({
  container: '#gjs',
  height: '100%',
  fromElement: false,
  storageManager: false,
  plugins: ['gjs-preset-webpage'],
  pluginsOpts: {
    'gjs-preset-webpage': {
      blocksBasicOpts: { blocks: ['text','image','video','link','map','1-column','2-columns','3-columns','2-columns-1'], flexGrid: true },
      exportOpts: false,
      aviaryOpts: false,
    }
  },
  canvas: {
    styles: [FONT_LINK]
  }
});

editor.setComponents(INITIAL_HTML);
editor.setStyle(INITIAL_CSS);

document.getElementById('downloadBtn').addEventListener('click', () => {
  const html = editor.getHtml();
  const css = editor.getCss();
  const full = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Md. Tofazzal Islam — Professor & Founding Director, IBGE</title>
<link rel="stylesheet" href="${FONT_LINK}">
<style>${css}</style>
</head>
<body>
${html}
</body>
</html>`;
  const blob = new Blob([full], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'index.html';
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
